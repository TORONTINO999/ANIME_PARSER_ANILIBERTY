name: Weekly AniLiberty Sync

on:
  schedule:
    # Каждую субботу в 03:00 UTC
    - cron: '0 3 * * 6'
  workflow_dispatch:  # ручной запуск

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 часов максимум

    steps:
      - name: ⬇️ Клонируем репозиторий
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Устанавливаем зависимости
        run: pip install -r requirements.txt

      - name: 🔄 Запускаем синхронизацию
        run: python sync.py

      - name: 📤 Коммитим изменения
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirrors/ all_anime.m3u errors.json last_sync.txt
          git diff --staged --quiet || git commit -m "🔄 Weekly sync $(date +%Y-%m-%d)"
          git push
