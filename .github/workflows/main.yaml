name: Parser CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Кнопка ручного запуска в интерфейсе GitHub

jobs:
  run-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Защита от бесконечного зависания раннера

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # tqdm удален, нужен только requests
          pip install requests

      - name: Run Parser
        run: python main.py

      - name: Upload Results
        # Загружаем артефакты даже если парсер упал (чтобы сохранить прогресс)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: aniliberty-data
          # Явные пути к файлам внутри папки mirrors
          path: |
            mirrors/aniliberty_all.m3u
            mirrors/parser_progress.json
            mirrors/posters/
          retention-days: 5
          if-no-files-found: warn # Не валить job, если файлов еще нет
