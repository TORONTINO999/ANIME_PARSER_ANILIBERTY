name: Parser CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Добавляет кнопку "Run workflow" вручную

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Parser
        run: python main.py

      # ✅ Вместо git push мы сохраняем файлы как артефакт
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: aniliberty-data
          path: |
            mirrors/
            aniliberty_all.m3u
            parser_progress.json
          retention-days: 5 # Хранить 5 дней
