name: Parser CI

on:
  push:
    branches: [ "main" ]

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. СНАЧАЛА устанавливаем библиотеки (включая playwright)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          # Если у вас есть другие зависимости, лучше использовать requirements.txt:
          # pip install -r requirements.txt

      # 2. ТОЛЬКО ПОТОМ устанавливаем браузеры
      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps chromium

      # 3. Запускаем ваш скрипт
      - name: Run Script
        run: python main.py
