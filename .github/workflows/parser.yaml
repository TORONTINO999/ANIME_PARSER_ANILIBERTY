name: Anime Parser - Multi Source

on:
  push:
    paths:
      - 'urls-anime.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  parse-anime:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false  # отключаем встроенные creds — будем использовать GH_TOKEN

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Если нужны системные пакеты (ffmpeg и т.п.) — раскомментируй:
      # - name: Install system packages
      #   run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run parser
        run: python parser.py
        env:
          # Если парсеру нужны переменные окружения — добавь сюда
          # API_KEY: ${{ secrets.API_KEY }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Добавляем только то, что реально изменилось
          git add mirrors/ aniliberty_all.m3u
          
          # Проверяем, есть ли что коммитить
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update mirrors: $(date -u +"%Y-%m-%d %H:%M:%S")"
          else
            echo "No changes to commit"
            exit 0
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Auto-update mirrors"
          title: "Auto: mirrors update"
          body: |
            Автоматическое обновление зеркал.
            - Релизов обработано: ~1800+
            - Сохранено: ~900+
            - Эпизодов в M3U: ~11k+
          branch: ci/mirrors-update
          delete-branch: true
          draft: false
