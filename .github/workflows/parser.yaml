name: AniLiberty Catalog Parser

on:
  schedule:
    - cron: '0 */12 * * *' # Раз в 12 часов
  workflow_dispatch:

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run main.py script
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mirrors/
          # Проверяем, изменилось ли что-то в папке mirrors, чтобы не делать пустых коммитов
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Автоматическое обновление базы плейлиста" && git push)
