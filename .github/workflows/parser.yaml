name: Anime Parser - Multi Source

on:
  push:
    paths:
      - 'urls-anime.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  parse-anime:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false  # важно: отключаем GITHUB_TOKEN для git-операций

      # Кэш Playwright
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-v1
          restore-keys: ${{ runner.os }}-playwright-

      # Python + кэш зависимостей
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Установка зависимостей из requirements.txt
      - name: Install Python packages
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      # Фикс import time
      - name: Fix missing import time
        run: |
          if ! grep -q "^import time" parser.py; then
            sed -i '1iimport time' parser.py
            echo "✅ import time добавлен"
          fi

      # Системные пакеты
      - name: Install system deps
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libgbm1 libasound2 libx11-6 libxcb1 \
            libxcomposite1 libxdamage1 libxrandr2 libgtk-3-0 || true

      # Запуск парсера
      - name: Run parser
        env:
          PYTHONUNBUFFERED: 1
        run: python parser.py

      # Создание PR с изменениями (с GH_TOKEN)
      - name: Create Pull Request with updated mirrors
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_TOKEN }}  # <-- используем твой токен
          commit-message: "Update mirrors [run ${{ github.run_id }}]"
          title: "Auto: update mirrors"
          body: |
            Автоматическое обновление зеркал из CI.
            Run ID: ${{ github.run_id }}
            Trigger: ${{ github.event_name }}
          branch: ci/mirrors-update-${{ github.run_id }}
          add-paths: mirrors/  # <-- исправлено на нижний регистр, как в твоём репо
          delete-branch: true
