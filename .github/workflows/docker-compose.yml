version: '3.8'

services:
  parser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aniliberty_parser
    environment:
      CONCURRENT_REQUESTS: 10
      GH_TOKEN: ${GH_TOKEN:-}
      GH_REPO: ${GH_REPO:-}
    volumes:
      - ./mirrors:/app/mirrors
      - ./logs:/app/logs
      - ./parse_cache.json:/app/parse_cache.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-d", "mirrors"]
      interval: 1m
      timeout: 10s
      retries: 3

  # Опционально: веб-интерфейс для просмотра результатов
  web:
    image: nginx:alpine
    container_name: aniliberty_web
    ports:
      - "8080:80"
    volumes:
      - ./mirrors:/usr/share/nginx/html:ro
      - ./aniliberty.m3u8:/usr/share/nginx/html/aniliberty.m3u8:ro
    depends_on:
      - parser
