name: Build AniLibria Mirror

on:
  schedule:
    # Запуск каждый день в 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Возможность ручного запуска

jobs:
  build-mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run mirror builder
        run: python main.py
        env:
          PYTHONUNBUFFERED: 1
          
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirrors/ anilibria_all.m3u processed.txt last_run.txt
          git diff --staged --quiet || git commit -m "🔄 Automatic mirror update $(date +'%Y-%m-%d %H:%M')"
          git push origin main
