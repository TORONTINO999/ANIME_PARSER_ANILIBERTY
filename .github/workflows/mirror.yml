name: AniLiberty Mirror Sync

on:
  schedule:
    # Каждое воскресенье в 04:00 UTC (07:00 МСК)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Полная пересканировка (игнорировать resume)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Clean resume cache (optional)
        if: github.event.inputs.force_full == 'true'
        run: rm -rf mirrors/anime/*/.last_sync

      - name: Run mirror scanner
        run: python mirror.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirrors/ main.m3u .last_sync
          [ -f errors.json ] && git add errors.json
          git diff --staged --quiet || git commit -m "chore: mirror sync $(date -u +%Y-%m-%d)"
          git push
